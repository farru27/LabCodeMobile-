<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CodeHub Mobile</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<!-- HEADER -->

<div class="header">

<div class="logo">
CodeHub Mobile
</div>

<div class="actions">
<button class="run" onclick="runCode()">▶ Ejecutar</button>
<button class="save" onclick="saveProject()">💾 Guardar</button>
</div>

</div>

<!-- TABS -->

<div class="tabs">

<div class="tab active" onclick="changeTab('html', this)">
HTML
</div>

<div class="tab" onclick="changeTab('css', this)">
CSS
</div>

<div class="tab" onclick="changeTab('js', this)">
JS
</div>

</div>

<!-- EDITOR -->

<div class="editor-container">

<textarea id="editor"></textarea>

<div class="preview">
<iframe id="preview"></iframe>
</div>

</div>

<!-- BOTON + -->

<div class="add-project" onclick="newProject()">
+
</div>

<script src="script.js"></script>

</body>
</html>
