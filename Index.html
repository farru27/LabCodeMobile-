<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>VSCode Mobile</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- TOPBAR -->

<div class="topbar">

<div class="left-buttons">

<button class="btn run"
onclick="runCode()">
▶ Ejecutar
</button>

<button class="btn view"
onclick="showPreview()">
🖥 Ver
</button>
<button class="btn"
onclick="showPrivacy()">
⚖ Privacidad
</button>

</div>

<div class="switch">

<button class="switch-btn active"
id="editorBtn">
Editor
</button>

<button class="switch-btn"
id="previewBtn">
Preview
</button>

</div>

</div>

<!-- TABS -->

<div class="tabs">

<div class="tab active"
onclick="changeTab('html', this)">
📄 index.html
</div>

<div class="tab"
onclick="changeTab('css', this)">
🎨 style.css
</div>

<div class="tab"
onclick="changeTab('js', this)">
⚡ script.js
</div>

</div>

<!-- EDITOR -->

<div class="editor-box"
id="editorBox">

<textarea id="editor"
spellcheck="false">
</textarea>

</div>

<!-- PREVIEW -->

<div class="preview-box"
id="previewBox">

<iframe id="preview"></iframe>

</div>

<script src="script.js"></script>

</body>
</html>
